name: Sync Fork
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure git
        run: |
          git config --global user.name "fork-sync-bot"
          git config --global user.email "fork-sync-bot@users.noreply.github.com"
          git config --global advice.detachedHead false
      - name: Detect upstream state
        id: detect
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          UPSTREAM: screenpipe/screenpipe
          FORK: patrickwilliams2345/screenpipe
        run: |
          set -euo pipefail
          upstream_sha=$(gh api "repos/${UPSTREAM}/commits/main" --jq '.sha' 2>/dev/null || echo "")
          fork_sha=$(gh api "repos/${FORK}/commits/main" --jq '.sha' 2>/dev/null || echo "")
          echo "upstream_sha=${upstream_sha}"
          echo "fork_sha=${fork_sha}"
          if [ -z "${upstream_sha}" ]; then
            echo "should_sync=false" >> "${GITHUB_OUTPUT}"
            echo "reason=upstream_unreachable" >> "${GITHUB_OUTPUT}"
          elif [ "${upstream_sha}" = "${fork_sha}" ] && [ "${github.event_name}" != "workflow_dispatch" ]; then
            echo "should_sync=false" >> "${GITHUB_OUTPUT}"
            echo "reason=up_to_date" >> "${GITHUB_OUTPUT}"
          else
            echo "should_sync=true" >> "${GITHUB_OUTPUT}"
            echo "reason=drift_detected" >> "${GITHUB_OUTPUT}"
          fi
      - name: Sync commits (branches)
        if: steps.detect.outputs.should_sync == 'true'
        uses: tgymnich/fork-sync@v2.0
        with:
          token: ${{ secrets.PAT }}
          owner: screenpipe
          base: main
          head: main
      - name: Sync tags from upstream
        if: steps.detect.outputs.should_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          UPSTREAM: screenpipe/screenpipe
          FORK: patrickwilliams2345/screenpipe
        run: |
          set -euo pipefail
          git clone --bare --no-tags --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${UPSTREAM}.git" /tmp/upstream
          cd /tmp/upstream
          git fetch --tags origin
          git push --tags "https://x-access-token:${GH_TOKEN}@github.com/${FORK}.git"
          echo "Tags pushed (newest 5):"
          git tag --sort=-version:refname | head -5