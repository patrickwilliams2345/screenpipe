name: Build macOS App

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

env:
  GIT_LFS_SKIP_SMUDGE: 1

jobs:
  build:
    name: Build macOS App (ARM64)
    runs-on: macos-15  # macOS 15 Sequoia (includes Xcode 16 / Swift 6.0 by default)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          eval "$(/opt/homebrew/bin/brew shellenv 2>/dev/null || /usr/local/bin/brew shellenv 2>/dev/null || true)"
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/sbin" >> $GITHUB_PATH
          brew install ffmpeg pkg-config wget jq cmake

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-rust-aarch64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}
          cache-directories: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/screenpipe-app-tauri/src-tauri/target/aarch64-apple-darwin

      - name: Cache Binary Dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/screenpipe-app-tauri/src-tauri/ffmpeg
            apps/screenpipe-app-tauri/src-tauri/ffmpeg-*
            apps/screenpipe-app-tauri/src-tauri/tesseract-*
            apps/screenpipe-app-tauri/src-tauri/ollama-*
            apps/screenpipe-app-tauri/src-tauri/lib/ollama
            apps/screenpipe-app-tauri/src-tauri/ui_monitor-*
          key: macos-aarch64-apple-darwin-bins-v1
          restore-keys: |
            macos-aarch64-apple-darwin-bins-

      - name: Install frontend dependencies
        working-directory: apps/screenpipe-app-tauri
        run: bun install

      - name: Run pre-build script
        working-directory: apps/screenpipe-app-tauri
        env:
          SCREENPIPE_RELEASE_TARGET: aarch64-apple-darwin
        run: bun scripts/pre_build.js

      - name: Build Tauri application
        working-directory: apps/screenpipe-app-tauri
        run: |
          bun tauri build --target aarch64-apple-darwin --features "metal,redact-onnx-coreml,official-build"

      - name: Compress .app bundle
        working-directory: apps/screenpipe-app-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos
        run: |
          zip -r "screenpipe-aarch64-apple-darwin.app.zip" *.app

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-macos-arm64-dmg
          path: apps/screenpipe-app-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Upload APP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-macos-arm64-app
          path: apps/screenpipe-app-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/screenpipe-aarch64-apple-darwin.app.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Release Assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} apps/screenpipe-app-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg --clobber
          gh release upload ${{ github.event.release.tag_name }} apps/screenpipe-app-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/screenpipe-aarch64-apple-darwin.app.zip --clobber
